<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Panel produktów | Home & Garden Outlet</title>
  <style>
    html,
    body,
    #nc-root {
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      min-width: 0;
    }

    #nc-root input,
    #nc-root textarea,
    #nc-root select,
    #nc-root button {
      max-width: 100%;
      font-size: 16px;
    }

    #nc-root img {
      max-width: 100%;
      height: auto;
    }

    .seo-character-counter {
      margin-top: 6px;
      color: #52625a;
      font-size: 13px;
      font-weight: 600;
    }

    .seo-character-counter.is-short {
      color: #8a6b28;
    }

    .seo-character-counter.is-long {
      color: #a33b32;
    }

    @media (max-width: 720px) {
      #nc-root {
        width: 100vw;
      }

      #nc-root main,
      #nc-root form,
      #nc-root section {
        max-width: 100vw;
      }
    }
  </style>
  <script>
    if (window.location.pathname.endsWith("/admin")) {
      window.location.replace(`${window.location.pathname}/${window.location.search}${window.location.hash}`);
    }
  </script>
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    const maxRecommendedUploadSize = 2.5 * 1024 * 1024;

    document.addEventListener("change", (event) => {
      const input = event.target;

      if (!(input instanceof HTMLInputElement) || input.type !== "file") {
        return;
      }

      const largeFiles = [...input.files].filter((file) => file.size > maxRecommendedUploadSize);

      if (largeFiles.length) {
        window.alert(
          "Zdjecie jest duze i zapis z telefonu moze sie nie udac przy slabszym internecie. " +
          "Najbezpieczniej dodawac zdjecia zmniejszone do okolo 2000 px lub ponizej 2,5 MB."
        );
      }
    });

    function updateSeoDescriptionCounter(textarea, counter) {
      const length = textarea.value.length;
      counter.textContent = `${length} znaków · zalecane około 140-160`;
      counter.classList.toggle("is-short", length > 0 && length < 140);
      counter.classList.toggle("is-long", length > 160);
    }

    function attachSeoDescriptionCounters() {
      document.querySelectorAll("#nc-root label").forEach((label) => {
        if (!label.textContent.includes("SEO - opis produktu")) return;

        let container = label.parentElement;
        let textarea = null;

        for (let level = 0; level < 5 && container && !textarea; level += 1) {
          textarea = container.querySelector("textarea");
          container = container.parentElement;
        }

        if (!textarea || textarea.dataset.seoCounterAttached) return;
        const counter = document.createElement("div");
        counter.className = "seo-character-counter";
        counter.setAttribute("aria-live", "polite");
        textarea.insertAdjacentElement("afterend", counter);
        textarea.dataset.seoCounterAttached = "true";
        textarea.addEventListener("input", () => updateSeoDescriptionCounter(textarea, counter));
        updateSeoDescriptionCounter(textarea, counter);
      });
    }

    const seoCounterObserver = new MutationObserver(attachSeoDescriptionCounters);
    seoCounterObserver.observe(document.documentElement, { childList: true, subtree: true });
    document.addEventListener("DOMContentLoaded", attachSeoDescriptionCounters);
  </script>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
</body>
</html>
