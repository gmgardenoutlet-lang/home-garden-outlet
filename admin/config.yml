backend:
  name: git-gateway
  repo: gmgardenoutlet-lang/home-garden-outlet
  branch: main

locale: pl
media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "catalog"
    label: "Produkty na stronie"
    files:
      - name: "products"
        label: "Katalog produktów Home & Garden Outlet"
        file: "data/products.json"
        fields:
          - label: "Dodaj nowy produkt"
            label_singular: "produkt"
            name: "products"
            widget: "list"
            add_to_top: true
            collapsed: true
            minimize_collapsed: true
            summary: "[{{fields.productNumber}}] {{fields.name}} — {{fields.category}} — {{fields.outletPrice}} — {{fields.status}} / {{fields.productStatus}}"
            fields:
              - label: "Numer produktu / ID"
                name: "productNumber"
                widget: "string"
                required: false
                hint: "Opcjonalny numer ułatwiający szybkie znalezienie produktu."
              - label: "Nazwa produktu"
                name: "name"
                widget: "string"
                hint: "Dobra nazwa mówi, co to jest, z czego jest i gdzie można to kupić. Przykład: Drewniana ławka ogrodowa — outlet Wrocław / Kębłowice."
              - label: "Kategoria"
                name: "category"
                widget: "select"
                options:
                  - label: "Dom"
                    value: "Wyposażenie domu"
                  - label: "Ogród"
                    value: "Wyposażenie ogrodu"
                  - label: "Dekoracje"
                    value: "Dekoracje"
                  - label: "Oświetlenie"
                    value: "Oświetlenie"
                  - label: "Inne"
                    value: "Inne"
              - label: "Krótki typ produktu"
                name: "productType"
                widget: "string"
                required: false
                hint: "Np. sofa, fotel, stół, lampa albo donica."
              - label: "Polecany na stronie głównej"
                name: "featured"
                widget: "boolean"
                default: true
                hint: "Polecane produkty mają pierwszeństwo w sekcji „Polecane perełki z outletu”."
              - label: "Widoczny na stronie"
                name: "visible"
                widget: "boolean"
                default: true
                hint: "Wyłącz, aby zachować produkt w panelu, ale ukryć go przed klientami."

              - label: "Cena katalogowa producenta — opcjonalna"
                name: "catalogPrice"
                widget: "string"
                required: false
                hint: "Wpisz tylko wtedy, gdy znasz cenę producenta lub cenę katalogową. To nie jest cena sprzedaży."
              - label: "Cena outletowa / cena sprzedaży — wymagana"
                name: "outletPrice"
                widget: "string"
                required: true
                hint: "Tutaj wpisz realną cenę sprzedaży w Home & Garden Outlet. Jeśli cena nie jest jeszcze znana, przed publikacją produktu ustal ją lub ukryj produkt."
              - label: "Waluta"
                name: "currency"
                widget: "select"
                default: "PLN"
                options:
                  - "PLN"

              - label: "Zdjęcie główne"
                name: "image"
                widget: "image"
                choose_url: false
                hint: "Wymagane. Najlepiej użyć wyraźnego zdjęcia produktu wykonanego na miejscu."
              - label: "Galeria zdjęć"
                name: "gallery"
                widget: "list"
                required: false
                hint: "Opcjonalnie dodaj dodatkowe zdjęcia. Zdjęcie główne pozostaje pierwsze."
                field:
                  label: "Zdjęcie galerii"
                  name: "image"
                  widget: "image"
                  choose_url: false
              - label: "Alt zdjęcia"
                name: "imageAlt"
                widget: "string"
                required: false
                hint: "Opisz naturalnie zdjęcie, np. Drewniana ławka ogrodowa dostępna w Home & Garden Outlet w Kębłowicach pod Wrocławiem. Jeśli zostawisz puste, strona użyje nazwy produktu."

              - label: "Krótki opis na kartę produktu"
                name: "description"
                widget: "text"
                hint: "Napisz krótko, co to za produkt, gdzie pasuje i czy jest dostępny od ręki."
              - label: "Dłuższy opis produktu"
                name: "longDescription"
                widget: "text"
                required: false
              - label: "Wymiary"
                name: "dimensions"
                widget: "string"
                required: false
              - label: "Materiał"
                name: "material"
                widget: "string"
                required: false
              - label: "Kolor"
                name: "color"
                widget: "string"
                required: false
              - label: "Stan produktu"
                name: "condition"
                widget: "select"
                required: false
                options:
                  - "Nowy"
                  - "Outletowy"
                  - "Po ekspozycji"
                  - "Końcówka kolekcji"
                  - "Produkt z drobnymi śladami"
                  - "Inny"

              - label: "Dostępność"
                name: "status"
                widget: "select"
                options:
                  - label: "Dostępny od ręki"
                    value: "Dostępne"
                  - label: "Nowość — dostępna od ręki"
                    value: "Nowość"
                  - label: "Ostatnia sztuka"
                    value: "Ostatnia sztuka"
                  - label: "Rezerwacja"
                    value: "Rezerwacja"
                  - label: "Sprzedany"
                    value: "Sprzedane"
                  - label: "Zapytaj o dostępność"
                    value: "Zapytaj o dostępność"
              - label: "Status produktu"
                name: "productStatus"
                widget: "select"
                default: "Aktywny"
                options:
                  - "Aktywny"
                  - "Sprzedany"
                  - "Ukryty"
                  - "Rezerwacja"
                hint: "Aktywny pokazuje produkt. Ukryty nie pokazuje go klientom. Sprzedany pozostaje widoczny z odpowiednią etykietą."

              - label: "Nazwa SEO produktu"
                name: "seoTitle"
                widget: "string"
                required: false
                hint: "Przykład: Drewniana ławka ogrodowa — outlet Wrocław / Kębłowice. Jeśli pozostawisz puste, tytuł powstanie automatycznie."
              - label: "Meta opis produktu"
                name: "seoDescription"
                widget: "text"
                required: false
                hint: "Opcjonalnie. Zalecana długość: około 140–160 znaków. Jeśli pozostawisz puste, opis powstanie automatycznie."
              - label: "Sugerowana nazwa pliku zdjęcia"
                name: "suggestedImageFilename"
                widget: "string"
                required: false
                hint: "Opcjonalnie, np. drewniana-lawka-ogrodowa-home-garden-outlet."
              - label: "Adres produktu (slug)"
                name: "slug"
                widget: "string"
                required: false
                hint: "Opcjonalnie, np. zestaw-ogrodowy-merano. Jeśli pozostawisz puste, adres powstanie automatycznie z nazwy."

              - label: "Lokalizacja produktu w sklepie"
                name: "storeLocation"
                widget: "select"
                required: false
                options:
                  - "Sala główna"
                  - "Stodoła"
                  - "Ogród"
                  - "Magazyn"
                  - "Przy wejściu"
                  - "Prawa strona showroomu"
                  - "Inna"
                hint: "Informacja wewnętrzna — nie jest widoczna dla klientów."
              - label: "Notatka wewnętrzna"
                name: "internalNote"
                widget: "text"
                required: false
                hint: "Informacja tylko dla obsługi — nie jest widoczna publicznie."
              - label: "Kolejność"
                name: "order"
                widget: "number"
                default: 0
                value_type: "int"
                hint: "Niższa liczba wyświetla produkt wcześniej na podstronie kategorii."
