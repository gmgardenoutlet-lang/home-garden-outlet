backend:
  name: git-gateway
  repo: gmgardenoutlet-lang/home-garden-outlet
  branch: main

locale: pl
media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "catalog"
    label: "Katalog"
    files:
      - name: "products"
        label: "Produkty"
        file: "data/products.json"
        fields:
          - label: "Produkty"
            name: "products"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - label: "Nazwa"
                name: "name"
                widget: "string"
              - label: "Kategoria"
                name: "category"
                widget: "select"
                options:
                  - "Wyposażenie ogrodu"
                  - "Wyposażenie domu"
              - label: "Cena katalogowa"
                name: "catalogPrice"
                widget: "string"
                required: false
              - label: "Cena outletowa / cena sprzedaży"
                name: "outletPrice"
                widget: "string"
                required: false
              - label: "Status"
                name: "status"
                widget: "select"
                options:
                  - "Nowość"
                  - "Dostępne"
                  - "Ostatnia sztuka"
                  - "Rezerwacja"
                  - "Sprzedane"
              - label: "Zdjęcie"
                name: "image"
                widget: "image"
              - label: "Galeria zdjęć"
                name: "gallery"
                widget: "list"
                required: false
                hint: "Dodaj dodatkowe zdjęcia produktu. Zdjęcie główne pozostaje pierwsze."
                field:
                  label: "Zdjęcie galerii"
                  name: "image"
                  widget: "image"
              - label: "Opis"
                name: "description"
                widget: "text"
              - label: "Wymiary"
                name: "dimensions"
                widget: "string"
                required: false
              - label: "SEO - tytuł produktu"
                name: "seoTitle"
                widget: "string"
                required: false
                hint: "Opcjonalnie. Jeśli pozostawisz puste, powstanie automatycznie z nazwy produktu i marki."
              - label: "SEO - opis produktu"
                name: "seoDescription"
                widget: "text"
                required: false
                hint: "Opcjonalnie. Zalecana długość: około 140-160 znaków. Jeśli pozostawisz puste, opis powstanie automatycznie."
              - label: "Opis alternatywny zdjęcia"
                name: "imageAlt"
                widget: "string"
                required: false
                hint: "Krótko opisz, co znajduje się na głównym zdjęciu. Jeśli pozostawisz puste, użyta zostanie nazwa produktu."
              - label: "Adres produktu (slug)"
                name: "slug"
                widget: "string"
                required: false
                hint: "Opcjonalnie, np. zestaw-ogrodowy-merano. Jeśli pozostawisz puste, adres powstanie automatycznie z nazwy."
              - label: "Pokaż na stronie głównej"
                name: "featured"
                widget: "boolean"
                default: true
              - label: "Kolejność"
                name: "order"
                widget: "number"
                default: 0
                value_type: "int"
