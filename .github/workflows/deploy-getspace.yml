name: Deploy to Getspace

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: getspace-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Przygotuj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Przygotuj paczkę Getspace
        run: node scripts/build-getspace.mjs

      - name: Zoptymalizuj zdjęcia produktów
        run: |
          python -m pip install --disable-pip-version-check Pillow
          python scripts/optimize-getspace-images.py publish

      - name: Wygeneruj statyczne karty produktów
        run: SITE_ROOT=publish node scripts/prerender-products.mjs

      - name: Wdróż przez bezpieczny FTPS
        if: ${{ env.FTP_SERVER != '' && env.FTP_USERNAME != '' && env.FTP_PASSWORD != '' && env.FTP_REMOTE_DIR != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./publish/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          log-level: minimal
